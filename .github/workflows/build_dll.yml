name: Build ExplorerBlurMica DLL

on:
  push:
    branches:
      - master
      - main
  workflow_dispatch:

jobs:
  build:
    runs-on: windows-latest

    steps:
      - name: Checkout repository
        uses: actions/checkout@v4

      - name: Setup MSBuild
        uses: microsoft/setup-msbuild@v2

      - name: Setup NuGet
        uses: NuGet/setup-nuget@v2

      - name: Restore NuGet packages
        run: nuget restore ExplorerBlurMica_Source/ExplorerBlurMica.sln

      - name: Build Solution
        run: msbuild ExplorerBlurMica_Source/ExplorerBlurMica.sln -p:Configuration=Release -p:Platform=x64

      - name: Upload DLL Artifact
        uses: actions/upload-artifact@v4
        with:
          name: ExplorerBlurMica-DLL
          path: ExplorerBlurMica_Source/build/x64/Release/ExplorerBlurMica.dll
